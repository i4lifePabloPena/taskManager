<ion-header>
  <ion-toolbar>
    <ion-title>Log In</ion-title>
      <ion-button
        (click)="cancel()"
        slot="end"
        [strong]="true"
      >Cancel</ion-button>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-input
      [(ngModel)]="username"
      name="username"
      placeholder="Usuario"
      ></ion-input>
  </ion-item>
  <ion-item>
    <ion-input
      [(ngModel)]="password"
      name="password"
      type="password"
      placeholder="Contraseña"
    ><ion-input-password-toggle slot="end"></ion-input-password-toggle></ion-input>
  </ion-item>
  <ion-button
  (click)="login()"
  >Ingresar</ion-button>
</ion-content>
