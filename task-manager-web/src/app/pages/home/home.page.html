<!-- Header -->
<ion-header>
  <ion-toolbar>
    <ion-title>Tareas <ion-icon *ngIf="isAdmin" name="shield-checkmark" color="success"></ion-icon></ion-title><ion-title *ngIf="isAdmin">Admin</ion-title>
    <ion-button fill="outline" slot="end" [routerLink]="['/tareas']">Ir aTareas</ion-button>
    <ion-button color="danger" fill="clear" slot="end" (click)="logout()">Cerrar sesión</ion-button>
  </ion-toolbar>
</ion-header>
<!-- Body -->
<ion-content class="ion-padding">
  <!-- addTasks -->
  <div class="toolNav">      
    <ion-item>
      <ion-input clear-input="true" [(ngModel)]="newTaskTitle" name="newTaskTitle" placeholder="New Task"></ion-input>
      <ion-button (click)="addTask()">ADD</ion-button>
    </ion-item>
  </div>
  <div class="container">
  <!-- Filters -->
  <div class="side">
    <!-- Status -->
    <ion-select  #statusFilter (ionChange)="changeFilterStatus(statusFilter.value)" toggleIcon="funnel-outline" label="Task Status" interface="popover" label-placement="floating" fill="solid">
      <ion-select-option value="-1">All</ion-select-option>
      <ion-select-option value="0">Pendientes</ion-select-option>
      <ion-select-option value="1">En Progreso</ion-select-option>
      <ion-select-option value="2">Completadas</ion-select-option>
    </ion-select>
    <!-- Tags -->
    <ion-select 
    toggleIcon="pricetags-outline"
    label="Tags"
    interface="popover"
    label-placement="floating"
    fill="solid"
    (ionChange)="filterTasksChange($event)"
    >
    <ion-select-option>All</ion-select-option>
    <ion-select-option value="{{tag._id}}" *ngFor="let tag of tags">{{tag.nameTag}}</ion-select-option>
      </ion-select>
    </div>
    
    <!-- Cards -->
    <div class="main">
      <ion-card *ngFor="let task of tasks">
      <!-- Title -->
      <ion-card-header>
        <ion-label [color]="colorTask(task)">{{ task.title }}</ion-label>
      </ion-card-header>
      <!-- Tags -->
      <ion-card-content>
        <ion-chip *ngFor="let tag of task.idTags" color="medium">{{ tag.nameTag }}</ion-chip>
      </ion-card-content>
      <!-- Buttons -->
      <ion-button fill="solid" color="primary" (click)="toggleTask(task)"> <ion-icon name="play-skip-forward-outline"></ion-icon></ion-button>
      <ion-button slot="" fill="solid" color="success" (click)="openModal(task)"><ion-icon name="pricetag-outline"></ion-icon></ion-button>
      <ion-button fill="solid" color="danger" (click)="deleteTaskAlert(task)"> <ion-icon name="trash"> </ion-icon> </ion-button>
      </ion-card>
    </div>
  </div>
</ion-content>
