<!-- Header -->
<ion-header>
  <ion-toolbar>
    <ion-title slot="start">Tareas</ion-title>
    <ion-button
    float="float"
    color="warning"
    fill="clear"
    [routerLink]="['/admin-panel']"
    *ngIf="isAdmin"
    >
    <ion-title slot="end">
      Admin
      <ion-icon name="shield-checkmark" color="success"></ion-icon>
    </ion-title>
  </ion-button>
  <ion-button
    color="danger"
    fill="outline"
    slot="end"
    (click)="logout()"
    size="small"
  >Log Out</ion-button>
  </ion-toolbar>

</ion-header>


<!-- Body -->
<ion-content class="ion-padding">
  <!-- addTasks -->
  <div class="addTask">      
    <ion-item>
      <ion-input clear-input="true" [(ngModel)]="newTaskTitle" name="newTaskTitle" placeholder="New Task"></ion-input>
      <ion-button
        (click)="addTask()"
      >ADD</ion-button>
    </ion-item>
  </div>

  <div class="container">
    <!-- Filters -->
    <div class="side">
      <!-- Calendar -->
        <ion-button
        color="tertiary"
        [routerLink]="['/calendar']"
        ><ion-icon name="calendar-outline"></ion-icon>Calendar</ion-button>
      <!-- Trash -->
        <ion-button
        color="danger"
        [routerLink]="['/trash']"
        ><ion-icon name="trash-outline"></ion-icon>Trash</ion-button>
      <!-- Status -->
      <ion-select
        #statusFilter
        (ionChange)="changeFilterStatus(statusFilter.value)"
        toggleIcon="funnel-outline"
        label="Task Status"
        interface="popover"
        label-placement="floating"
        fill="solid"
      >
        <ion-select-option value="-1">All</ion-select-option>
        <ion-select-option value="0">Pendientes</ion-select-option>
        <ion-select-option value="1">En Progreso</ion-select-option>
        <ion-select-option value="2">Completadas</ion-select-option>
      </ion-select>
      <!-- Tags -->
      <ion-select
        toggleIcon="pricetags-outline"
        label="Tags"
        interface="popover"
        label-placement="floating"
        fill="solid"
        (ionChange)="filterTask($event)"
      >
        <ion-select-option value="All">All</ion-select-option>
        <ion-select-option value="{{tag._id}}" *ngFor="let tag of tags">{{tag.nameTag}}</ion-select-option>
      </ion-select>
    </div>

    <!-- Cards -->
    <div class="main">
      <ion-card *ngFor="let task of tasks">
        <!-- Title -->
        <ion-card-header>
          <ion-toolbar class="test">
            <ion-label [color]="colorTask(task)" slot="start">{{ task.title }}</ion-label>
            <ion-chip outline="true" [color]="colorTask(task)">{{statusChip(task)}}</ion-chip>

            <!-- Calendar -->
            <ion-datetime-button
              class=""
              slot="end"
              [datetime]="'datetime-' + task._id"
            ></ion-datetime-button>

            <ion-popover keepContentsMounted="true">
              <ng-template>
                <ion-datetime
                  (ionChange)="dateUpdate(task, $event)"
                  presentation="date"
                  [id]="'datetime-' + task._id"
                  showDefaultButtons="true"
                  min="2026"
                  max="2027"
                  firstDayOfWeek="1"
                >
                </ion-datetime>
              </ng-template>
            </ion-popover>

            <ion-chip outline="true" [color]="colorDate(task)" slot="end" disabled="true">{{task.limitDate | date:'dd/MM/yyyy'}}</ion-chip>
            <!-- Calendar End -->
          </ion-toolbar>
        </ion-card-header>
        <!-- Img -->
        <img *ngIf="task.url" [src]="task.url" alt="Tarea imagen">
          <!-- Tags -->
        <ion-card-content>
          <ion-chip *ngFor="let tag of task.idTags" color="medium">{{ tag.nameTag }}</ion-chip>
        </ion-card-content>
        <!-- Buttons -->
        <ion-footer class="ion-no-border">
          <!-- Cambiar Estado -->
          <ion-button
          fill="solid"
          color="primary"
          (click)="toggleTask(task)"
          size="small"
          ><ion-icon name="play-skip-forward-outline"></ion-icon></ion-button>
          <!-- Abrir Modal Tags -->
          <ion-button
          slot=""
          fill="solid"
          color="success"
          (click)="openModal(task)"
          size="small"
          ><ion-icon name="pricetag-outline"></ion-icon></ion-button>
          <!-- Delete Task Alert -->
          <ion-button
            fill="solid"
            color="danger"
            (click)="deleteTaskAlert(task)"
            size="small"
          ><ion-icon name="trash"></ion-icon></ion-button>
        </ion-footer>
      </ion-card>
    </div>
  </div>
</ion-content>
