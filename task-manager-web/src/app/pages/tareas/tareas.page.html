<ion-header>
  <ion-toolbar>
    <ion-title>Mis Tareas <ion-icon *ngIf="isAdmin" name="shield-checkmark" color="success"></ion-icon> </ion-title>
  </ion-toolbar>
</ion-header>

<ion-button [routerLink]="['/home']">Go Back</ion-button>

<ion-content class="ion-padding">
  <ion-list>
    <!-- <ion-item> -->
      <ion-select class="ion-float-left" #statusFilter (ionChange)="changeFilterStatus(statusFilter.value)" toggleIcon="funnel-outline" label="Task Status" interface="popover" label-placement="floating" fill="outline">
        <ion-select-option value="-1">All</ion-select-option>
        <ion-select-option value="0">Pendientes</ion-select-option>
        <ion-select-option value="1">En Progreso</ion-select-option>
        <ion-select-option value="2">Completadas</ion-select-option>
      </ion-select>
    <!-- </ion-item> -->
      <!-- <ion-item>         -->
        <!-- <ion-select 
          class="ion-float-left"
          toggleIcon="pricetags-outline"
          label="Tags"
          interface="popover"
          label-placement="floating"
          fill="outline"
          (ionChange)="filterTasks($event)"
        >
          <ion-select-option>All</ion-select-option>
          <ion-select-option value="{{tag._id}}" *ngFor="let tag of tags">{{tag.nameTag}}</ion-select-option>
        </ion-select> -->
      <!-- </ion-item> -->
      <ion-item class="ion-float">
        <ion-input clear-input="true" [(ngModel)]="newTaskTitle" name="newTaskTitle" placeholder="New Task"></ion-input>
        <ion-button (click)="addTask()">ADD</ion-button>
      </ion-item>
  </ion-list>
  <ion-list>
    <ion-item *ngFor="let task of tasks">
      <ion-label [color]="colorTask(task)"> {{ task.title }} </ion-label>
      

      <!-- Imagen -->
      <ion-button *ngIf="task.url" color="tertiary" (click)="fileDelete(task)"> <ion-icon name="close-circle-outline"></ion-icon></ion-button>

      <img *ngIf="task.url" [src]="task.url" alt="Tarea imagen" width="250px" height="250px">
      <!-- Input de archivo -->
      <input 
        #fileInput
        type="file" 
        accept="image/*"
        style="display: none"
        (change)="onFileSelected($event, task._id)"
        />
      
      <!-- Botón upload -->
      <ion-button 
        color="primary" 
        fill="clear" 
        slot="end"
        (click)="fileInput.click()"
        [disabled]="uploadingTaskId === task._id"
        *ngIf="isAdmin"
      >
        <ion-icon name="image-outline"></ion-icon>
        <span *ngIf="uploadingTaskId === task._id">Subiendo...</span>
      </ion-button>
      
      <!-- status change -->
      <ion-button color="primary" slot="end" (click)="toggleTask(task)"> <ion-icon name="play-skip-forward-outline"></ion-icon> </ion-button>
    
      <!-- delete -->
      <ion-button color="danger" fill="clear" (click)="deleteTask(task._id)"> <ion-icon name="trash"></ion-icon> </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
